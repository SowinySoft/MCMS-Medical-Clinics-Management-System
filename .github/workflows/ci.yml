name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MCMS_DB_HOST: 127.0.0.1
      MCMS_DB_PORT: 5432
      MCMS_DB_USER: postgres
      MCMS_DB_PASSWORD: postgres
      MCMS_DB_NAME: mcms
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check . || true

      - name: Build test database (deterministic, from committed sql/)
        env:
          MCMS_TEST_DB: mcms   # Django connects to MCMS_DB_NAME=mcms; build it there
        run: MODE=from-sql bash scripts/rebuild_test_db.sh

      - name: Run backend tests
        run: pytest --no-migrations -p no:cacheprovider

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Type-check (tsc)
        working-directory: frontend
        run: npx tsc -b

      - name: Build (vite)
        working-directory: frontend
        run: npm run build
