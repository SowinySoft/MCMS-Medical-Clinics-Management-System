name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      MCMS_DB_HOST: 127.0.0.1
      MCMS_DB_PORT: 5432
      MCMS_DB_USER: postgres
      MCMS_DB_PASSWORD: postgres
      MCMS_DB_NAME: mcms
      PGPASSWORD: postgres

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Lint (ruff)
        run: ruff check . || true

      - name: Build test database (deterministic, from committed sql/)
        env:
          MCMS_TEST_DB: mcms   # Django connects to MCMS_DB_NAME=mcms; build it there
        run: MODE=from-sql bash scripts/rebuild_test_db.sh

      - name: Deep integrity audit (orphan events, sequence sync, check + model drift)
        env:
          MCMS_DB_NAME: mcms
          PGPASSWORD: postgres
        run: python scripts/audit_deep.py

      - name: Emit-event subject-party lint (static regression guard)
        run: python scripts/audit_emit_event.py

      - name: ERD docs must match live schema (regenerate guard)
        run: |
          python scripts/gen_erd.py
          git diff --exit-code -- docs/erd_per_schema.html docs/erd_schema_diagram.html docs/erd_schema_cards.html \
            || { echo "docs/*.html are out of date — run scripts/gen_erd.py and commit the result."; exit 1; }

      - name: Run backend tests
        run: pytest --no-migrations -p no:cacheprovider -rA --junitxml=pytest-report.xml > pytest.log 2>&1 || true
      - name: Upload backend test log + report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-pytest-log
          path: |
            pytest.log
            pytest-report.xml
          retention-days: 7

  # Bootstrap gate: reproduce the miget deploy environment (non-superuser role,
  # production entrypoint start.sh) and assert admin login returns 200. This
  # catches deploy-only bugs (missing psql, AUTHORIZATION postgres, missing
  # auth_user/app_user) that the superuser-built test DB never surfaces.
  bootstrap:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      BOOT_HOST: 127.0.0.1
      BOOT_PORT: "5432"
      BOOT_DB: mcms_boot
      BOOT_ROLE: appuser
      BOOT_PW: apppw
      BOOT_SUPERUSER_URL: "postgres://postgres:postgres@127.0.0.1:5432/postgres"
      MCMS_ADMIN_PASSWORD: admin123
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Bootstrap-from-scratch deploy simulation (non-superuser + start.sh)
        run: bash scripts/test_bootstrap.sh

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Type-check (tsc)
        working-directory: frontend
        run: npx tsc -b

      - name: Build (vite)
        working-directory: frontend
        run: npm run build

  frontend-e2e:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      MCMS_DB_HOST: 127.0.0.1
      MCMS_DB_PORT: 5432
      MCMS_DB_USER: postgres
      MCMS_DB_PASSWORD: postgres
      # Isolated DB: the backend job also targets `mcms` and these jobs run in
      # parallel, so reusing `mcms` let the e2e rebuild (DROP DATABASE ... FORCE)
      # collide with backend's tests and intermittently empty the schema. Give
      # e2e its own database.
      MCMS_DB_NAME: mcms_e2e
      MCMS_TEST_DB: mcms_e2e
      PGPASSWORD: postgres
      DJANGO_SETTINGS_MODULE: config.settings
      AXES_ENABLED: "false"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Build test database (from committed sql/)
        run: MODE=from-sql bash scripts/rebuild_test_db.sh

      - name: Provision real login users (97_test_users.sql sets an invalid hash)
        run: |
          python manage.py provision_user --username admin --password admin123 --role sysadmin --party-name "System Administrator" --superuser
          python manage.py provision_user --username acc1 --password acc1123 --role accountant --party-name "Acc1 Clerk"

      - name: Start Django API on :8010
        run: |
          python manage.py runserver 127.0.0.1:8010 --noreload > /tmp/django.log 2>&1 &
          for i in $(seq 1 30); do
            # Any HTTP response (incl. 401) means the server is up; -s -o /dev/null
            # exits 0 on a successful TCP/HTTP exchange regardless of status code.
            if curl -s -o /dev/null http://127.0.0.1:8010/api/; then
              echo "API up"; break
            fi
            sleep 2
          done
          curl -s -o /dev/null http://127.0.0.1:8010/api/ || { echo "API failed to start"; tail -30 /tmp/django.log; exit 1; }

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci || npm install

      - name: Build (vite)
        working-directory: frontend
        run: npm run build

      - name: Install Playwright chromium
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      - name: Run e2e smoke test
        working-directory: frontend
        run: npx playwright test
