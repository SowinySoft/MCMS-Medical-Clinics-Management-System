# Phase 12: local scale topology for MCMS.
# Brings up the API (Daphne) + PostgreSQL primary + Redis (channel layer).
# Scale out by adding more `api` replicas behind a load balancer; reads can be
# split to a replica by setting MCMS_DB_REPLICA_HOST on the api service.
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: mcms
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcms"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      MCMS_DB_HOST: postgres
      MCMS_DB_PORT: "5432"
      MCMS_DB_NAME: mcms
      MCMS_DB_USER: postgres
      MCMS_DB_PASSWORD: postgres
      MCMS_REDIS_URL: redis://redis:6379/0
      MCMS_CONN_MAX_AGE: "60"
      # MCMS_DB_REPLICA_HOST: <replica-host>   # opt-in read replica
    ports:
      - "8000:8000"
    command: ["daphne", "-b", "0.0.0.0", "-p", "8000", "config.asgi:application"]
    deploy:
      replicas: 1   # bump for horizontal scale; shared state lives in PG + Redis
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/system/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
